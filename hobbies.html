---
layout: default
title: My Hobbies
body_class: hobbies
---

<section class="content-wrapper">
  <h1>My Drawings</h1>
  <div class="gallery">
    {% for drawing in site.data.hobbies %}
    <figure>
      <img src="{{ drawing.image | relative_url }}" alt="{{ drawing.alt }}" />
      <figcaption>{{ drawing.caption }}</figcaption>
    </figure>
    {% endfor %}
  </div>
</section>
